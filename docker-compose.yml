services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL
      - JWT_SECRET
      - LLM_API_KEY
      - REDIS_HOST
      - REDIS_PORT
      - REDIS_PASSWORD
      - CORS_ORIGIN
    depends_on:
      - db
      - redis
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: action-architect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tebele
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
volumes:
  db-data:
